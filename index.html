<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SIAKAD Redirect</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; color: #333; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #2d7a50; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h3>Mengarahkan ke Sistem Informasi...</h3>
    <div class="loader"></div>
    <script>
        // Fetch raw URL from url.txt with a timestamp to bust cache
        fetch('url.txt?t=' + new Date().getTime())
            .then(res => res.text())
            .then(url => {
                var cleanUrl = url.trim();
                if (cleanUrl.startsWith('http')) {
                    window.location.replace(cleanUrl);
                } else {
                    document.body.innerHTML = '<h3>Gagal.</h3>';
                }
            })
            .catch(e => {
                document.body.innerHTML = '<h3>Koneksi bermasalah.</h3>';
            });
    </script>
</body>
</html>
